---
- name: Deploy Assignment Tracker Node.js application
  hosts: app_servers
  become: true

  vars:
    app_name: assignment-tracker
    app_user: assignmenttracker
    app_dir: /opt/assignment-tracker
    app_port: 3000

    db_host: localhost
    db_port: 3306
    db_user: root
    db_password: ""
    db_name: assignment_tracker

    session_secret: change-this-secret

  tasks:
    - name: Install Node.js, npm, and rsync
      ansible.builtin.apt:
        name:
          - nodejs
          - npm
          - rsync
        state: present
        update_cache: true

    - name: Create application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy application files to server
      ansible.posix.synchronize:
        src: "../"
        dest: "{{ app_dir }}/"
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.env"
          - "--exclude=node_modules"
          - "--exclude=ansible"

    - name: Set application file ownership
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Create production environment file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
        content: |
          PORT={{ app_port }}
          SESSION_SECRET={{ session_secret }}

          DB_HOST={{ db_host }}
          DB_PORT={{ db_port }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          DB_NAME={{ db_name }}

          MAIL_SERVER=localhost
          MAIL_PORT=25
          MAIL_USE_TLS=false
          MAIL_USE_SSL=false
          MAIL_USERNAME=
          MAIL_PASSWORD=
          MAIL_DEFAULT_SENDER=noreply@example.com
          MAIL_RECIPIENT=

    - name: Install production dependencies
      ansible.builtin.command: npm ci --omit=dev
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"

    - name: Create systemd service
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ app_name }}.service"
        mode: "0644"
        content: |
          [Unit]
          Description=Assignment Tracker Node.js App
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart=/usr/bin/node app.js
          Restart=always
          RestartSec=5
          User={{ app_user }}
          Group={{ app_user }}

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable application service
      ansible.builtin.systemd:
        name: "{{ app_name }}"
        enabled: true
        state: restarted
        daemon_reload: true
